name: Publish to PyPI

# Publishes on every GitHub Release. Uses PyPI Trusted Publishing (OIDC) —
# no API token secret needed. One-time setup on pypi.org:
#   Account -> Publishing -> Add a new pending publisher:
#     project: securecommit, owner: joemunene-by, repo: securecommit,
#     workflow: publish.yml, environment: pypi
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
